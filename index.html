<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Antara</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
    text-align: center;
}

/* Text */
h1 {
    position: absolute;
    top: 20%;
    width: 100%;
    font-size: 50px;
    color: white;
    animation: glow 2s infinite alternate;
}
h2 {
    position: absolute;
    top: 32%;
    width: 100%;
    font-size: 35px;
    color: yellow;
    animation: bounce 1.5s infinite;
}

@keyframes glow {
    from { transform: scale(1); }
    to { transform: scale(1.1); color: yellow; }
}
@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Cake */
.cake {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
}
.layer {
    width: 150px;
    height: 40px;
    background: pink;
    border-radius: 10px;
    margin: 5px auto;
}
.candle {
    width: 10px;
    height: 30px;
    background: orange;
    margin: auto;
}
.flame {
    width: 10px;
    height: 10px;
    background: yellow;
    border-radius: 50%;
    animation: flicker 0.3s infinite alternate;
}
@keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.3); }
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 50px;
    height: 70px;
    border-radius: 50%;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    100% { transform: translateY(-110vh); }
}

/* Flowers */
.flower {
    position: absolute;
    top: -50px;
    font-size: 24px;
    animation: fall 5s linear infinite;
}
@keyframes fall {
    100% { transform: translateY(110vh); }
}

/* Confetti */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background: red;
    animation: explode 1s linear forwards;
}
@keyframes explode {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Antara 🎂</h1>
<h2>🎈 Antara turns 10 today! 🎈</h2>

<!-- Cake -->
<div class="cake">
    <div class="flame"></div>
    <div class="candle"></div>
    <div class="layer"></div>
    <div class="layer"></div>
</div>

<script>
// Balloons
for(let i=0; i<25; i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random()*100 + "vw";
    b.style.background = "hsl(" + Math.random()*360 + ",70%,60%)";
    b.style.animationDuration = (4+Math.random()*3)+"s";
    document.body.appendChild(b);
}

// Flowers
let flowers = ["🌸","🌼","🌺","🌷"];
for(let i=0; i<35; i++){
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = flowers[Math.floor(Math.random()*4)];
    f.style.left = Math.random()*100 + "vw";
    f.style.animationDuration = (3+Math.random()*3)+"s";
    document.body.appendChild(f);
}

// Click Confetti
document.addEventListener("click", function(e){
    for(let i=0; i<30; i++){
        let c = document.createElement("div");
        c.className = "confetti";
        
        c.style.left = e.clientX + "px";
        c.style.top = e.clientY + "px";
        c.style.background = "hsl(" + Math.random()*360 + ",70%,60%)";
        
        c.style.setProperty('--x', (Math.random()*200-100)+"px");
        c.style.setProperty('--y', (Math.random()*200-100)+"px");
        
        document.body.appendChild(c);
        
        setTimeout(()=>c.remove(),1000);
    }
});
</script>

</body>
</html>
